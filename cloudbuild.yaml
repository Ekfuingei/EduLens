# EduLens - Automated Google Cloud Run Deployment
# Bonus: Infrastructure-as-code for Gemini Live Agent Challenge
#
# Prerequisites:
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com
#   gcloud builds submit --config=cloudbuild.yaml
#
# Set substitutions via trigger or:
#   gcloud builds submit --substitutions=_SERVICE_NAME=edulens,_REGION=us-central1

substitutions:
  _SERVICE_NAME: edulens
  _REGION: us-central1

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
